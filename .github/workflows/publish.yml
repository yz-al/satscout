# Publishes satscout to PyPI via Trusted Publishing (OIDC — no API token).
#
# One-time setup on https://pypi.org (do this BEFORE the first release):
#   Account → Publishing → Add a new pending publisher:
#     PyPI project name: satscout
#     Owner:             yz-al
#     Repository:        satscout
#     Workflow name:     publish.yml
#     Environment:       pypi
#
# Then releasing is just:
#   git tag v0.1.0 && git push origin v0.1.0

name: publish

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - name: offline unit tests
        run: pytest tests -m "not network" -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi  # must match the environment named in the PyPI publisher
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
